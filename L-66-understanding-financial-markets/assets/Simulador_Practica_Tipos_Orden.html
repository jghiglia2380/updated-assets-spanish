<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Práctica de Tipos de Orden</title>
    <style>
        :root { --primary: #6366f1; --secondary: #8b5cf6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #1f2937; max-width: 900px; margin: 0 auto; padding: 15px; }
        h1 { color: var(--primary); font-size: 24px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        h2 { color: var(--secondary); font-size: 18px; margin-top: 20px; }
        .scenario { background: #f9fafb; padding: 15px; border-radius: 5px; margin: 15px 0; border-left: 4px solid var(--primary); }
        .stock-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
        .info-box { background: white; padding: 10px; border-radius: 4px; text-align: center; }
        .info-label { font-size: 11px; color: #6b7280; }
        .info-value { font-size: 18px; font-weight: bold; color: var(--primary); }
        .order-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .order-btn { padding: 15px; background: white; border: 2px solid #d1d5db; border-radius: 5px; cursor: pointer; text-align: left; }
        .order-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .order-btn.selected { border-color: var(--primary); background: #e0e7ff; }
        .order-btn.correct { border-color: var(--success); background: #d1fae5; }
        .order-btn.incorrect { border-color: var(--danger); background: #fee2e2; }
        .order-title { font-weight: bold; margin-bottom: 5px; }
        .order-desc { font-size: 12px; color: #6b7280; }
        .feedback { padding: 15px; border-radius: 5px; margin: 15px 0; display: none; }
        .feedback.correct { background: #d1fae5; border: 1px solid var(--success); }
        .feedback.incorrect { background: #fee2e2; border: 1px solid var(--danger); }
        .results { background: #e0e7ff; padding: 15px; border-radius: 5px; margin: 15px 0; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: var(--secondary); }
        .score { font-size: 24px; font-weight: bold; color: var(--primary); }
        @media print { body { font-size: 11pt; } button { display: none; } .order-btn { page-break-inside: avoid; } }
    </style>
</head>
<body>
    <h1>Simulador de Práctica de Tipos de Orden</h1>
    <p>Practique seleccionando el tipo de orden correcto para diferentes escenarios de trading</p>

    <div id="scenarios-container"></div>

    <div style="text-align: center; margin: 20px 0;">
        <button onclick="startPractice()">Iniciar Práctica (5 Escenarios)</button>
        <button onclick="showResults()">Mostrar Resultados</button>
    </div>

    <div class="results" id="results" style="display: none;">
        <h2 style="margin-top: 0;">Resultados de Práctica</h2>
        <p>Puntuación: <span class="score" id="score">0/5</span></p>
        <div id="summary"></div>
    </div>

    <script>
        const scenarios = [
            {
                id: 1,
                title: "Compra Rápida al Precio Actual",
                context: "Ha hecho su investigación y desea comprar AAPL inmediatamente al precio que esté disponible. El mercado está estable.",
                stock: "AAPL",
                lastPrice: 175.50,
                bid: 175.48,
                ask: 175.52,
                volume: "45M",
                correct: "market",
                explanation: "Una orden de mercado se ejecuta inmediatamente al mejor precio disponible. Como desea comprar de inmediato y el diferencial es ajustado, una orden de mercado es apropiada."
            },
            {
                id: 2,
                title: "Comprar Solo a un Mejor Precio",
                context: "Desea comprar NVDA pero solo si baja a $420 o menos. El precio actual es $445.",
                stock: "NVDA",
                lastPrice: 445.00,
                bid: 444.95,
                ask: 445.05,
                volume: "38M",
                correct: "limit",
                explanation: "Una orden límite de compra le permite especificar el precio máximo que está dispuesto a pagar. Solo se ejecutará a $420 o menos."
            },
            {
                id: 3,
                title: "Protegerse Contra Pérdidas",
                context: "Posee TSLA a $200 y desea vender automáticamente si baja de $180 para limitar pérdidas.",
                stock: "TSLA",
                lastPrice: 195.00,
                bid: 194.95,
                ask: 195.05,
                volume: "52M",
                correct: "stop",
                explanation: "Una orden stop-loss activa una venta cuando el precio cae a su precio stop, protegiéndolo de mayores pérdidas."
            },
            {
                id: 4,
                title: "Vender a un Precio Objetivo",
                context: "Posee MSFT a $350 y desea tomar ganancias cuando llegue a $400.",
                stock: "MSFT",
                lastPrice: 385.00,
                bid: 384.95,
                ask: 385.05,
                volume: "22M",
                correct: "limit",
                explanation: "Una orden límite de venta especifica el precio mínimo que aceptará. Se ejecutará cuando el precio llegue a $400 o más."
            },
            {
                id: 5,
                title: "Protección en Acción Volátil",
                context: "Posee una acción biotecnológica volátil. Desea vender si baja a $50, pero le preocupa el deslizamiento en un mercado de movimiento rápido.",
                stock: "BIOTECH",
                lastPrice: 58.00,
                bid: 57.80,
                ask: 58.20,
                volume: "5M",
                correct: "stop-limit",
                explanation: "Una orden stop-límite se activa en su precio stop pero solo se ejecuta a su precio límite o mejor, previniendo deslizamiento excesivo en condiciones volátiles."
            }
        ];

        let answers = {};
        let currentScenarios = [];

        function startPractice() {
            currentScenarios = [...scenarios];
            answers = {};
            const container = document.getElementById('scenarios-container');
            container.innerHTML = '';
            document.getElementById('results').style.display = 'none';

            currentScenarios.forEach((scenario, index) => {
                const scenarioDiv = document.createElement('div');
                scenarioDiv.className = 'scenario';
                scenarioDiv.id = `scenario-${scenario.id}`;
                scenarioDiv.innerHTML = `
                    <h2 style="margin-top: 0;">Escenario ${index + 1}: ${scenario.title}</h2>
                    <p>${scenario.context}</p>
                    <div class="stock-info">
                        <div class="info-box"><div class="info-label">Acción</div><div class="info-value">${scenario.stock}</div></div>
                        <div class="info-box"><div class="info-label">Último Precio</div><div class="info-value">$${scenario.lastPrice.toFixed(2)}</div></div>
                        <div class="info-box"><div class="info-label">Oferta</div><div class="info-value">$${scenario.bid.toFixed(2)}</div></div>
                        <div class="info-box"><div class="info-label">Demanda</div><div class="info-value">$${scenario.ask.toFixed(2)}</div></div>
                        <div class="info-box"><div class="info-label">Volumen</div><div class="info-value">${scenario.volume}</div></div>
                    </div>
                    <p><strong>¿Qué tipo de orden es mejor para esta situación?</strong></p>
                    <div class="order-options" id="options-${scenario.id}">
                        <div class="order-btn" onclick="selectOrder(${scenario.id}, 'market', this)">
                            <div class="order-title">Orden de Mercado</div>
                            <div class="order-desc">Ejecutar inmediatamente al precio actual del mercado</div>
                        </div>
                        <div class="order-btn" onclick="selectOrder(${scenario.id}, 'limit', this)">
                            <div class="order-title">Orden Límite</div>
                            <div class="order-desc">Ejecutar solo al precio especificado o mejor</div>
                        </div>
                        <div class="order-btn" onclick="selectOrder(${scenario.id}, 'stop', this)">
                            <div class="order-title">Orden Stop</div>
                            <div class="order-desc">Activar orden de mercado cuando el precio alcance el stop</div>
                        </div>
                        <div class="order-btn" onclick="selectOrder(${scenario.id}, 'stop-limit', this)">
                            <div class="order-title">Orden Stop-Límite</div>
                            <div class="order-desc">Activar orden límite cuando el precio alcance el stop</div>
                        </div>
                    </div>
                    <div class="feedback" id="feedback-${scenario.id}"></div>
                `;
                container.appendChild(scenarioDiv);
            });
        }

        function selectOrder(scenarioId, orderType, element) {
            answers[scenarioId] = orderType;

            // Update visual selection
            const options = document.querySelectorAll(`#options-${scenarioId} .order-btn`);
            options.forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
        }

        function showResults() {
            let correct = 0;
            let summaryHTML = '';

            currentScenarios.forEach(scenario => {
                const userAnswer = answers[scenario.id];
                const isCorrect = userAnswer === scenario.correct;
                if (isCorrect) correct++;

                // Update button styling
                const options = document.querySelectorAll(`#options-${scenario.id} .order-btn`);
                options.forEach(btn => {
                    btn.classList.remove('selected');
                    const btnType = btn.querySelector('.order-title').textContent.toLowerCase().replace(' order', '').replace('-', '-');
                    if (btnType.includes(scenario.correct.replace('-', '-'))) {
                        btn.classList.add('correct');
                    } else if (userAnswer && btnType.includes(userAnswer.replace('-', '-'))) {
                        btn.classList.add('incorrect');
                    }
                });

                // Show feedback
                const feedback = document.getElementById(`feedback-${scenario.id}`);
                feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
                feedback.innerHTML = `<strong>${isCorrect ? '¡Correcto!' : 'Incorrecto'}</strong><br>${scenario.explanation}`;
                feedback.style.display = 'block';

                const orderTypeSpanish = {
                    'market': 'Mercado',
                    'limit': 'Límite',
                    'stop': 'Stop',
                    'stop-limit': 'Stop-Límite'
                };

                summaryHTML += `<p><strong>Escenario ${scenario.id}:</strong> ${isCorrect ? '✓' : '✗'} - Mejor respuesta: Orden ${orderTypeSpanish[scenario.correct]}</p>`;
            });

            document.getElementById('score').textContent = `${correct}/${currentScenarios.length}`;
            document.getElementById('summary').innerHTML = summaryHTML;
            document.getElementById('results').style.display = 'block';
        }

        // Initialize with scenarios
        startPractice();
    </script>
</body>
</html>
